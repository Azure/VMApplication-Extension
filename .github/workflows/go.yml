name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build_linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.23.4

    - name: Download dependencies
      run: go get ./...

    - name: Tidy modules
      run: go mod tidy

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
  
  build_windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.23.4

    - name: Download dependencies
      run: go get ./...

    - name: Tidy modules
      run: go mod tidy

    - name: Build
      run: go build -v ./...

    - name: Install gsudo
      run: choco install gsudo
      
    - name: Test
      run: gsudo go test -v ./...
